        <div class="primary-menus">
            <ul class="selects">
                <li>
                    常用
                </li>
                <li class="current" data-target="baidu-search">
                    <span>
                        百度
                    </span>
                </li>
                <li data-target="f-search">
                    <span>

                    </span>

                <li data-target="bing-search">

                <li data-target="uisdc2-search">

                    </span>
                </li>
                <li data-target="juejin-search">

            <div class="cont">
                <div class="right-link">
                    <a href="/" class="add_fav" target="_blank" title="ctrl+f 在本页搜索">
                        
                        <strong><i class="fa fa-search"></i> Ctrl+F</strong> 搜索本站

                        &nbsp;翻译工具
                    </a>

                <div class="left-cont">
                    <!-- input的name指向搜索的参数 -->
                    <form class="search" id="baidu-search" action="https://www.baidu.com/s"
                    method="get" target="_blank">
                        <input type="text" autocomplete="off" name="wd" class="s" placeholder="请输入搜索词">
                        <button type="submit" name="submit" class="btn">
                            百度搜索
                        </button>
                    </form>
                    <form class="search hidden" id="f-search" action="https://fsoufsou.com/search"
                    method="get" target="_blank">
                        <input type="text" autocomplete="off" name="q" class="s" placeholder="请输入搜索词">
                        <button type="submit" name="submit" class="btn">
                            F搜索
                        </button>
                    </form>
                    <form class="search hidden" id="bing-search" action="https://cn.bing.com/"
                    method="get" target="_blank">
                        <input type="text" autocomplete="off" name="q" class="s" placeholder="请输入搜索词">
                        <button type="submit" name="submit" class="btn">
                            Bing搜索
                        </button>
                    </form>
                    <form class="search hidden" id="uisdc2-search" action="https://www.uisdc.com/"
                    method="get" target="_blank">
                        <input type="text" name="s" class="s" autocomplete="off" placeholder="在优设网搜索设计相关">
                        <button type="submit" name="submit" class="btn">
                            优设搜索
                        </button>
                    </form>
                    <form class="search hidden" id="juejin-search" action="https://juejin.cn/search"
                    method="get" target="_blank">
                        <input type="text" name="query" class="s" autocomplete="off" placeholder="在掘金搜索开发相关">
                        <button type="submit" name="submit" class="btn">
                            掘金搜索
                        </button>
                    </form>
                    <form class="search hidden" id="zhihu-search" action="https://www.zhihu.com/search"
                    method="get" target="_blank">
                        <input type="text" name="q" class="s" autocomplete="off" placeholder="在知乎搜一下">
                        <button type="submit" name="submit" class="btn">
                            知乎搜索
                        </button>
                    </form>
                    <form class="search hidden" id="wubin-search" action="https://www.wubin.work/search"
                    method="get" target="_blank">
                        <input type="text" name="s" class="s" autocomplete="off" placeholder="在我的博客中搜一下">
                        <button type="submit" name="submit" class="btn">
                            本站搜索
                        </button>
                    </form>
                </div>
            </div>
